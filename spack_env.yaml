# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  specs:
  - igraph@0.10.15+shared
  - py-pybind11
  - python
  - py-setuptools
  view: true
  concretizer:
    unify: true
  packages:
    gcc:
      externals:
      - spec: gcc@9.4.0 languages:='c,c++,fortran'
        prefix: /usr
        extra_attributes:
          compilers:
            c: /usr/bin/gcc
            cxx: /usr/bin/g++
            fortran: /usr/bin/gfortran